<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#06090e;--surface:#0c1219;--card:#101922;--card-alt:#0e151e;
--border:#182636;--border-lite:#121e2b;
--text:#cdd8e4;--text-bright:#eaf0f6;--text-muted:#5a7a98;--text-dim:#334860;
--accent:#2a9df4;--accent-glow:rgba(42,157,244,.15);--accent-dim:#143d60;
--green:#22c993;--green-bg:rgba(34,201,147,.08);--green-dim:#0c3d2e;
--red:#e85454;--red-bg:rgba(232,84,84,.08);--red-dim:#3d1414;
--amber:#e8a832;--amber-bg:rgba(232,168,50,.08);--amber-dim:#3d2e0c;
--purple:#9474f0;--purple-bg:rgba(148,116,240,.08);
--mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
--radius:6px;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

/* Layout */
.wrap{max-width:1140px;margin:0 auto;padding:16px 20px 40px}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:14px;border-bottom:1px solid var(--border-lite);margin-bottom:16px}
.hdr-left .tag{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:2px}
.hdr-left h1{font-size:22px;font-weight:700;color:var(--text-bright);letter-spacing:-.4px}
.hdr-right{text-align:right;font-family:var(--mono);font-size:10px;color:var(--text-dim);line-height:1.7}
.hdr-right .hl{color:var(--accent);font-weight:600;font-size:11px}
.live-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tabs */
.tabs{display:flex;gap:1px;background:var(--surface);border-radius:var(--radius);padding:3px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;padding:8px 14px;border-radius:4px;cursor:pointer;color:var(--text-muted);white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.panel{display:none}
.panel.active{display:block}

/* Cards */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border-lite);border-radius:var(--radius);padding:14px 16px}
.card-dark{background:var(--card-alt)}
.card-title{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.card-title .badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:8.5px;margin-left:6px;letter-spacing:1px}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-accent{background:var(--accent-glow);color:var(--accent)}

/* Metrics */
.metric{margin-bottom:8px}
.metric:last-child{margin-bottom:0}
.metric-label{font-size:11px;color:var(--text-muted);margin-bottom:2px}
.metric-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text-bright)}
.metric-val.sm{font-size:15px}
.metric-val .unit{font-size:12px;font-weight:400;color:var(--text-muted);margin-left:2px}
.metric-val.green{color:var(--green)}.metric-val.red{color:var(--red)}.metric-val.amber{color:var(--amber)}.metric-val.accent{color:var(--accent)}
.metric-sub{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:1px}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)}
.tbl td{padding:6px 8px;border-bottom:1px solid var(--border-lite);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl .team{font-weight:600;color:var(--text-bright)}
.tbl .num{font-family:var(--mono);text-align:right}
.tbl .win{color:var(--green)}.tbl .loss{color:var(--red)}.tbl .pending{color:var(--text-dim)}
.tbl .seed{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-right:4px}

/* Bars */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-row:last-child{margin-bottom:0}
.bar-label{font-size:11px;color:var(--text-muted);min-width:100px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:18px;background:var(--surface);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-fill.ours{background:var(--accent)}
.bar-fill.field{background:var(--text-dim)}
.bar-fill.green{background:var(--green)}
.bar-fill.red{background:var(--red)}
.bar-fill.amber{background:var(--amber)}
.bar-fill.purple{background:var(--purple)}
.bar-pct{font-family:var(--mono);font-size:10px;color:var(--text-dim);min-width:42px;text-align:right;flex-shrink:0}

/* Inline bars for distro */
.dist-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11.5px}
.dist-name{min-width:90px;text-align:right;color:var(--text-muted);flex-shrink:0;font-family:var(--mono);font-size:10.5px}
.dist-bar{flex:1;height:14px;background:var(--surface);border-radius:2px;overflow:hidden}
.dist-fill{height:100%;border-radius:2px}
.dist-pct{font-family:var(--mono);font-size:10px;color:var(--text-dim);min-width:36px;text-align:right;flex-shrink:0}
.dist-note{font-size:9.5px;color:var(--red);min-width:14px;text-align:center}

/* Info boxes */
.info-box{padding:10px 14px;border-radius:var(--radius);margin-top:10px;font-size:12px;line-height:1.5}
.info-box.green{background:var(--green-bg);border-left:3px solid var(--green);color:var(--green)}
.info-box.amber{background:var(--amber-bg);border-left:3px solid var(--amber);color:var(--amber)}
.info-box.red{background:var(--red-bg);border-left:3px solid var(--red);color:var(--red)}
.info-box.accent{background:var(--accent-glow);border-left:3px solid var(--accent);color:var(--accent)}
.info-box .info-title{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;opacity:.8}

/* Section divider */
.section{margin-top:16px}
.section-title{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-lite)}

/* Path plan */
.path-day{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border-lite)}
.path-day:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.path-num{font-family:var(--mono);font-size:10px;color:var(--accent);background:var(--accent-glow);padding:4px 8px;border-radius:4px;flex-shrink:0;min-width:44px;text-align:center;font-weight:600}
.path-num.done{color:var(--green);background:var(--green-bg)}
.path-num.active{color:var(--amber);background:var(--amber-bg)}
.path-content{flex:1}
.path-round{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;margin-bottom:2px}
.path-desc{font-size:12.5px;color:var(--text);line-height:1.5}
.path-prob{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:3px}
.path-tag{display:inline-block;font-family:var(--mono);font-size:8.5px;padding:1px 5px;border-radius:2px;margin-left:6px;letter-spacing:.5px}
.path-tag.save{color:var(--amber);background:var(--amber-bg)}
.path-tag.cross{color:var(--purple);background:var(--purple-bg)}
.path-tag.burn{color:var(--red);background:var(--red-bg)}

/* Player bars */
.player-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.player-name{font-size:11.5px;min-width:110px;text-align:right;flex-shrink:0}
.player-name.us{color:var(--accent);font-weight:600}
.player-alive{font-family:var(--mono);font-size:10px;min-width:56px;flex-shrink:0;text-align:right}
.player-bar{flex:1;height:14px;background:var(--surface);border-radius:2px;overflow:hidden}
.player-fill{height:100%;border-radius:2px}

/* Live score cards */
.score-card{background:var(--card);border:1px solid var(--border-lite);border-radius:var(--radius);padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.score-card.live{border-color:var(--green-dim)}
.sc-teams{flex:1}
.sc-team{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:13px}
.sc-team:last-child{margin-bottom:0}
.sc-team .seed-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);min-width:16px}
.sc-team .name{font-weight:500}
.sc-team .name.winner{color:var(--green);font-weight:700}
.sc-team .score{font-family:var(--mono);font-weight:700;margin-left:auto;font-size:14px}
.sc-status{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;text-align:right;min-width:60px;flex-shrink:0}
.sc-status.live{color:var(--green)}.sc-status.final{color:var(--text-dim)}.sc-status.upcoming{color:var(--text-muted)}

/* Footer */
.footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--border-lite);font-family:var(--mono);font-size:9px;color:var(--text-dim);text-align:center;letter-spacing:.5px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

// ═══════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════
function h(tag, attrs, ...children) {
  var el = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'className') el.className = attrs[k];
    else if (k === 'style') el.style.cssText = attrs[k];
    else if (k.startsWith('on')) el[k.toLowerCase()] = attrs[k];
    else el.setAttribute(k, attrs[k]);
  });
  children.flat(Infinity).forEach(function(c) {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  });
  return el;
}

function pct(n, d) { return d ? (n / d * 100).toFixed(1) + '%' : '—'; }
function money(n) { return '$' + Math.round(n).toLocaleString(); }

function calcEquity(contest) {
  if (!contest.alive_field || !contest.alive_ours) return 0;
  return (contest.alive_ours / contest.alive_field) * contest.prize_pool;
}

function fetchScores() {
  var url = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=20260320&groups=100&limit=50';
  fetch(url).then(function(r){return r.json()}).then(function(data) {
    var container = document.getElementById('scores-container');
    if (!container) return;
    container.innerHTML = '';
    if (!data.events || !data.events.length) {
      container.appendChild(h('div', {className:'card', style:'text-align:center;color:var(--text-dim);padding:40px'}, 'No games found for today'));
      return;
    }
    data.events.forEach(function(ev) {
      var comp = ev.competitions[0];
      var home = comp.competitors.find(function(c){return c.homeAway==='home'});
      var away = comp.competitors.find(function(c){return c.homeAway==='away'});
      var status = comp.status.type.description;
      var clock = comp.status.displayClock;
      var period = comp.status.period;
      var isLive = comp.status.type.state === 'in';
      var isFinal = comp.status.type.completed;

      var statusText = isLive ? (clock + ' ' + (period === 1 ? '1H' : '2H')) : isFinal ? 'Final' : comp.status.type.shortDetail;
      var statusCls = isLive ? 'live' : isFinal ? 'final' : 'upcoming';

      var homeWin = isFinal && parseInt(home.score) > parseInt(away.score);
      var awayWin = isFinal && parseInt(away.score) > parseInt(home.score);

      // Check if this team is one of ours
      var ourTeams = D.splash.teams_used.concat(Object.keys(D.splash.teams_saved));

      var card = h('div', {className:'score-card' + (isLive ? ' live' : '')},
        h('div', {className:'sc-teams'},
          h('div', {className:'sc-team'},
            h('span', {className:'seed-num'}, away.curatedRank && away.curatedRank.current <= 16 ? away.curatedRank.current : (away.team.seed || '')),
            h('span', {className:'name' + (awayWin ? ' winner' : '')}, away.team.shortDisplayName || away.team.displayName),
            h('span', {className:'score'}, away.score || '')
          ),
          h('div', {className:'sc-team'},
            h('span', {className:'seed-num'}, home.curatedRank && home.curatedRank.current <= 16 ? home.curatedRank.current : (home.team.seed || '')),
            h('span', {className:'name' + (homeWin ? ' winner' : '')}, home.team.shortDisplayName || home.team.displayName),
            h('span', {className:'score'}, home.score || '')
          )
        ),
        h('div', {className:'sc-status ' + statusCls},
          isLive ? [h('span', {className:'live-dot'}), statusText] : statusText
        )
      );
      container.appendChild(card);
    });
  }).catch(function(err) {
    var container = document.getElementById('scores-container');
    if (container) container.innerHTML = '<div class="card" style="color:var(--red);padding:20px">Score fetch error — retrying in 2 min</div>';
  });
}

  var teamSec = h('div', {className:'section'});
  teamSec.appendChild(h('div', {className:'section-title'}, 'Team Inventory'));
  var teamGrid = h('div', {className:'grid g2'});

  // Used
  var usedCard = h('div', {className:'card'});
  usedCard.appendChild(h('div', {className:'card-title'}, 'Teams Used (' + data.teams_used.length + ')'));
  data.teams_used.forEach(function(t) {
    usedCard.appendChild(h('div', {style:'display:inline-block;font-family:var(--mono);font-size:10.5px;padding:3px 8px;margin:2px;border-radius:3px;background:var(--surface);color:var(--text-muted)'}, t));
  });
  teamGrid.appendChild(usedCard);

  // Saved
  if (data.teams_saved) {
    var savedCard = h('div', {className:'card'});
    savedCard.appendChild(h('div', {className:'card-title'}, 'Teams Saved (' + Object.keys(data.teams_saved).length + ')'));
    Object.keys(data.teams_saved).forEach(function(t) {
      var info = data.teams_saved[t];
      savedCard.appendChild(h('div', {style:'display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border-lite);font-size:12px'},
        h('span', null, h('span', {className:'seed'}, '(' + info.seed + ')'), h('span', {style:'font-weight:600;color:var(--text-bright)'}, t)),
        h('span', {style:'font-family:var(--mono);font-size:10px;color:var(--text-dim)'}, info.note + ' · ' + info.assigned + ' entry')
      ));
    });
    teamGrid.appendChild(savedCard);
  } else if (data.teams_saved_note) {
    teamGrid.appendChild(h('div', {className:'card'},
      h('div', {className:'card-title'}, 'Flexibility'),
      h('div', {style:'font-size:12px;color:var(--text-muted);line-height:1.5'}, data.teams_saved_note)
    ));
  }

  teamSec.appendChild(teamGrid);
  p.appendChild(teamSec);

  return p;
}

// ═══════════════════════════════════════════
// DISTRIBUTION PANEL
// ═══════════════════════════════════════════
function renderDistro() {
  var p = h('div', {className:'panel' + (activeTab === 'Distro' ? ' active' : ''), 'data-tab':'Distro'});

  function renderDistBars(title, distData, maxPct, colorFn) {
    var sec = h('div', {className:'card', style:'margin-bottom:12px'});
    sec.appendChild(h('div', {className:'card-title'}, title));
    distData.forEach(function(d) {
      var fillColor = d.lost ? 'var(--red)' : (d.is12 ? 'var(--amber)' : 'var(--accent)');
      if (colorFn) fillColor = colorFn(d);
      var seedLabel = d.seed ? '(' + d.seed + ') ' : '';
      var row = h('div', {className:'dist-row'},
        h('div', {className:'dist-name'}, seedLabel + d.team),
        h('div', {className:'dist-bar'},
          h('div', {className:'dist-fill', style:'width:' + (d.pct / maxPct * 100) + '%;background:' + fillColor})
        ),
        h('div', {className:'dist-pct'}, d.pct.toFixed(1) + '%'),
        d.count != null ? h('div', {style:'font-family:var(--mono);font-size:9.5px;color:var(--text-dim);min-width:28px;text-align:right'}, '' + d.count) :
          h('div', {className:'dist-note'}, d.lost ? '\u2717' : '')
      );
      sec.appendChild(row);
    });
    return sec;
  }

  // Splash Day 1
  p.appendChild(renderDistBars(
    'Splash Day 1 — Field Pick Distribution (all 26 teams)',
    D.splash.field_dist_d1, 20
  ));

  // Splash Day 2 (partial — only tipped games)
  if (D.splash.field_dist_d2 && D.splash.field_dist_d2.length) {
    var splashD2Card = h('div', {className:'card', style:'margin-bottom:12px'});
    splashD2Card.appendChild(h('div', {className:'card-title'}, 'Splash Day 2 — Field Picks (partial — tipped games only) ',
      h('span', {className:'badge badge-amber'}, 'LIVE')
    ));
    splashD2Card.appendChild(h('div', {style:'font-size:11px;color:var(--text-dim);margin-bottom:8px;font-family:var(--mono)'},
      D.splash.field_d2_tipped_total + ' picks visible (' + D.splash.field_d2_tipped_pct + '% of alive field) — updates as games tip'
    ));
    D.splash.field_dist_d2.forEach(function(d) {
      if (d.count === 0) return;
      var row = h('div', {className:'dist-row'},
        h('div', {className:'dist-name'}, '(' + d.seed + ') ' + d.team),
        h('div', {className:'dist-bar'},
          h('div', {className:'dist-fill', style:'width:' + (d.pct / 8 * 100) + '%;background:var(--accent)'})
        ),
        h('div', {className:'dist-pct'}, d.pct.toFixed(2) + '%'),
        h('div', {style:'font-family:var(--mono);font-size:10px;color:var(--text-dim);min-width:36px;text-align:right'}, d.count + '')
      );
      splashD2Card.appendChild(row);
    });
    splashD2Card.appendChild(h('div', {className:'info-box accent', style:'margin-top:8px'},
      h('div', {className:'info-title'}, 'Virginia is the Splash Day 2 chalk at 15.8%'),
      '811 entries on Virginia (we have 21). Iowa State at 2.9% (151) — notable since ISU is our Day 4 burn candidate. Arizona at 1.4% (72) — a 1-seed being burned early by 72 entries while we have it saved for Day 8.'
    ));
    p.appendChild(splashD2Card);
  }

  // Sweat Day 1
  p.appendChild(renderDistBars(
    'Sweat Day 1 — Field Pick Distribution (all 23 teams)',
    D.sweat.field_dist_d1, 25
  ));

  // Sweat Day 2
  p.appendChild(renderDistBars(
    'Sweat Day 2 — Field Pick Distribution (full breakdown)',
    D.sweat.field_dist_d2, 30,
    function(d) { return d.is12 ? 'var(--amber)' : 'var(--accent)'; }
  ));

  // 1/2 Seed burn rate comparison
  var burnCard = h('div', {className:'card'});
  burnCard.appendChild(h('div', {className:'card-title'}, '1/2 Seed Burn Rate — Field Trend'));

  var burns = [
    { label: 'Sweat Day 1', pct: D.sweat.field_12seed_d1_pct },
    { label: 'Splash Day 1', pct: D.splash.field_12seed_d1_pct },
    { label: 'Sweat Day 2', pct: D.sweat.field_12seed_d2_pct }
  ];
  burns.forEach(function(b) {
    burnCard.appendChild(h('div', {className:'bar-row'},
      h('div', {className:'bar-label'}, b.label),
      h('div', {className:'bar-track'},
        h('div', {className:'bar-fill amber', style:'width:' + (b.pct / 55 * 100) + '%'})
      ),
      h('div', {className:'bar-pct'}, b.pct + '%')
    ));
  });
  burnCard.appendChild(h('div', {className:'info-box amber'},
    h('div', {className:'info-title'}, 'Half the alive field burned a 1/2 seed on Day 2'),
    '49.5% of Sweat Day 2 picks are 1/2 seeds (336/679), up from 4.2% on Day 1. Kansas alone accounts for 26.2%. We saved all our 1/2 seeds — this advantage compounds every round as the field runs out of top seeds.'
  ));
  p.appendChild(burnCard);

  // Day 1 elimination callout (Sweat)
  if (D.sweat.d1_eliminated) {
    p.appendChild(h('div', {className:'info-box red', style:'margin-top:12px'},
      h('div', {className:'info-title'}, 'Sweat Day 1: ' + D.sweat.d1_losers_count + ' teams lost, ' + D.sweat.d1_eliminated + ' entries eliminated (' + pct(D.sweat.d1_eliminated, D.sweat.field_size) + ')'),
      'Wisconsin(90), Saint Mary\'s(34), Georgia(16), UNC(14), Ohio State(12), BYU(12), South Florida(10). All 679 survivors submitted Day 2 picks.'
    ));
  }

  return p;
}

// ═══════════════════════════════════════════
// PLAYERS PANEL
// ═══════════════════════════════════════════
function renderPlayers() {
  var p = h('div', {className:'panel' + (activeTab === 'Players' ? ' active' : ''), 'data-tab':'Players'});

  p.appendChild(h('div', {className:'section-title'}, 'Portfolio Players — Splash (50+ Entries)'));

  var card = h('div', {className:'card'});
  var maxEntries = 100;

  D.splash.portfolio_players.forEach(function(pl) {
    var barColor = pl.pct >= 90 ? 'var(--green)' : pl.pct >= 75 ? 'var(--accent)' : pl.pct >= 60 ? 'var(--amber)' : 'var(--red)';
    var row = h('div', {style:'margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border-lite)'});
    row.appendChild(h('div', {style:'display:flex;align-items:center;gap:8px;margin-bottom:4px'},
      h('div', {className:'player-name' + (pl.is_us ? ' us' : ''), style:'min-width:0;text-align:left;font-size:13px;font-weight:' + (pl.is_us ? '700' : '500')}, pl.name + (pl.is_us ? ' (YOU)' : '')),
      h('div', {style:'margin-left:auto;font-family:var(--mono);font-size:12px;color:' + barColor}, pl.alive + '/' + pl.entries + ' alive (' + pl.pct + '%)')
    ));
    row.appendChild(h('div', {className:'player-bar', style:'height:10px;margin-bottom:4px'},
      h('div', {className:'player-fill', style:'width:' + pl.pct + '%;background:' + barColor + ';height:100%;border-radius:2px'})
    ));
    row.appendChild(h('div', {style:'display:flex;justify-content:space-between;font-size:10.5px;color:var(--text-dim);font-family:var(--mono)'},
      h('span', null, pl.picks),
      h('span', null, pl.note)
    ));
    card.appendChild(row);
  });

  p.appendChild(card);

  // Competitive insights
  p.appendChild(h('div', {className:'info-box accent', style:'margin-top:12px'},
    h('div', {className:'info-title'}, 'Competitive Position'),
    'princehal leads at 100% survival (no Wisconsin exposure). We rank 3rd at 82%. poopbutt2 and daviesloveiii took heavier hits. Key: princehal already burned Houston on Day 1 — they have fewer saves for late rounds.'
  ));

  return p;
}

// ═══════════════════════════════════════════
// PATH PLAN PANEL
// ═══════════════════════════════════════════
function renderPath() {
  var p = h('div', {className:'panel' + (activeTab === 'Path' ? ' active' : ''), 'data-tab':'Path'});

  p.appendChild(h('div', {className:'section-title'}, 'Full Tournament Path Plan'));
  p.appendChild(h('div', {style:'font-size:12px;color:var(--text-muted);margin-bottom:14px;line-height:1.5'},
    'Generated by path optimizer. Strategy: preserve 1/2 seeds for later rounds when field has fewer options. Cross-assign reused teams in R32 to avoid burning saves.'
  ));

  D.path.forEach(function(day) {
    var pathEl = h('div', {className:'path-day'},
      h('div', {className:'path-num ' + day.status}, day.status === 'done' ? '\u2713' : day.status === 'active' ? '\u25CF' : 'D' + day.day),
      h('div', {className:'path-content'},
        h('div', {className:'path-round'}, day.label + (day.tag ? ' ' : ''),
          day.tag ? h('span', {className:'path-tag ' + day.tag}, day.tagLabel) : null
        ),
        h('div', {className:'path-desc'},
          h('strong', null, 'Splash: '), day.splash
        ),
        h('div', {className:'path-desc', style:'margin-top:2px'},
          h('strong', null, 'Sweat: '), day.sweat
        ),
        day.prob ? h('div', {className:'path-prob'}, 'Win prob: ' + day.prob) : null,
        day.result ? h('div', {style:'font-size:11px;color:' + (day.status === 'done' ? 'var(--green)' : 'var(--amber)') + ';margin-top:3px;font-family:var(--mono)'}, day.result) : null
      )
    );
    p.appendChild(pathEl);
  });

  // Model warning
  p.appendChild(h('div', {className:'info-box red', style:'margin-top:12px'},
    h('div', {className:'info-title'}, 'Critical Model Insight'),
    'Nebraska is the UNDERDOG vs Vanderbilt (45.8%) in R32. Alabama is the UNDERDOG vs Texas Tech (42.4%). Conditional head-to-head probabilities differ significantly from seed-based estimates. Path plan will need recalculation after Day 2 results.'
  ));

  return p;
}

// ═══════════════════════════════════════════
// STRATEGY PANEL
// ═══════════════════════════════════════════
function renderStrategy() {
  var p = h('div', {className:'panel' + (activeTab === 'Strategy' ? ' active' : ''), 'data-tab':'Strategy'});

  // Model summary
  p.appendChild(h('div', {className:'section-title'}, 'Model Performance — ' + D.model.version));
  var modelGrid = h('div', {className:'grid g2'});

  var splashModel = h('div', {className:'card'},
    h('div', {className:'card-title'}, 'Splash Expected ROI'),
    h('div', {className:'grid g2', style:'gap:8px'},
      h('div', {className:'metric'},
        h('div', {className:'metric-label'}, 'Game Theory'),
        h('div', {className:'metric-val green'}, '+' + D.model.splash_game_theory.roi + '%'),
        h('div', {className:'metric-sub'}, 'E[profit]: ' + money(D.model.splash_game_theory.ev) + ' · P(profit): ' + D.model.splash_game_theory.p_profit + '%')
      ),
      h('div', {className:'metric'},
        h('div', {className:'metric-label'}, 'Portfolio'),
        h('div', {className:'metric-val green'}, '+' + D.model.splash_portfolio.roi + '%'),
        h('div', {className:'metric-sub'}, 'E[profit]: ' + money(D.model.splash_portfolio.ev) + ' · P(profit): ' + D.model.splash_portfolio.p_profit + '%')
      )
    )
  );
  modelGrid.appendChild(splashModel);

  var sweatModel = h('div', {className:'card'},
    h('div', {className:'card-title'}, 'Sweat Expected ROI ', h('span', {className:'badge badge-green'}, '0% VIG')),
    h('div', {className:'grid g2', style:'gap:8px'},
      h('div', {className:'metric'},
        h('div', {className:'metric-label'}, 'Game Theory'),
        h('div', {className:'metric-val green'}, '+' + D.model.sweat_game_theory.roi + '%')
      ),
      h('div', {className:'metric'},
        h('div', {className:'metric-label'}, 'Portfolio'),
        h('div', {className:'metric-val green'}, '+' + D.model.sweat_portfolio.roi + '%')
      )
    )
  );
  modelGrid.appendChild(sweatModel);
  p.appendChild(modelGrid);

  // Milestones
  var mileCard = h('div', {className:'card', style:'margin-top:12px'});
  mileCard.appendChild(h('div', {className:'card-title'}, 'Profit Milestones — Splash'));
  var milestones = [
    { entries: 82, round: 'After Day 1', eq: calcEquity(D.splash), hit: true },
    { entries: 50, round: 'Sweet 16 target', eq: (50 / 2000) * D.splash.prize_pool, hit: false },
    { entries: 20, round: 'Elite 8 target', eq: (20 / 500) * D.splash.prize_pool, hit: false },
    { entries: 5, round: 'Final Four target', eq: (5 / 50) * D.splash.prize_pool, hit: false },
    { entries: 1, round: 'Last one standing', eq: D.splash.prize_pool, hit: false }
  ];
  milestones.forEach(function(m) {
    mileCard.appendChild(h('div', {style:'display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-lite);font-size:12px'},
      h('span', {style:'color:' + (m.hit ? 'var(--green)' : 'var(--text-muted)')}, (m.hit ? '\u2713 ' : '\u25CB ') + m.round),
      h('span', {style:'font-family:var(--mono);color:' + (m.hit ? 'var(--green)' : 'var(--text-dim)')}, m.entries + ' entries alive \u2192 ~' + money(m.eq) + ' equity')
    ));
  });
  p.appendChild(mileCard);

  // Key lessons
  var lessonCard = h('div', {className:'card', style:'margin-top:12px'});
  lessonCard.appendChild(h('div', {className:'card-title'}, 'Key Learnings'));
  D.lessons.forEach(function(l, i) {
    lessonCard.appendChild(h('div', {style:'padding:6px 0;border-bottom:1px solid var(--border-lite);font-size:12px;color:var(--text-muted);line-height:1.5'},
      h('span', {style:'font-family:var(--mono);color:var(--accent);margin-right:6px'}, (i+1) + '.'),
      l
    ));
  });
  p.appendChild(lessonCard);

  // Random baseline verification
  p.appendChild(h('div', {className:'info-box green', style:'margin-top:12px'},
    h('div', {className:'info-title'}, 'Model Calibration Verified'),
    'Random baseline ROI: ' + D.model.random_baseline_roi + '% (matches 10% vig — PASS). Model is properly calibrated against random selection strategy.'
  ));

  return p;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
fetchScores();
setInterval(fetchScores, 120000);
</script>
