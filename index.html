<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAA Survivor 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080d13;--surface:#0d1520;--card:#111c28;--border:#1a2a3a;--bl:#14202c;--text:#d0dae4;--tm:#6080a0;--td:#3a5570;--accent:#2a9df4;--ad:#164a72;--green:#2dd4a0;--gd:#14443a;--red:#f06060;--rd:#441818;--amber:#f0b040;--amd:#443810;--mono:'IBM Plex Mono',monospace;--body:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh}
.w{max-width:1100px;margin:0 auto;padding:20px 24px}
header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--bl)}
.tag{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
h1{font-size:24px;font-weight:700;color:#eef2f6;letter-spacing:-.5px}
.di{text-align:right;font-family:var(--mono);font-size:11px;color:var(--td);line-height:1.8}
.di .day{color:var(--accent);font-weight:600;font-size:12px}
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:9px 0;text-align:center;font-size:12px;font-weight:500;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--td);font-family:var(--body);transition:all .2s}
.tab.active{background:var(--ad);color:var(--accent)}
.tab:hover:not(.active){color:var(--tm)}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px}
.mc{background:var(--card);border-radius:8px;padding:14px 16px;border:1px solid var(--bl)}
.mc.ac{background:linear-gradient(135deg,#0d1f30,#132840);border-color:var(--ad)}
.ml{font-family:var(--mono);font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1.2px}
.mv{font-size:22px;font-weight:700;color:#eef2f6;margin-top:4px;font-family:var(--mono)}
.mc.ac .mv{color:var(--accent)}
.ms{font-size:11px;color:var(--td);margin-top:2px}
.st{font-family:var(--mono);font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}
.pr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bl)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pn{width:110px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--accent);font-weight:600}
.pb{flex:1;background:#141e2a;border-radius:3px;height:16px;position:relative;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,#164a72,#2a8ad0)}
.pfl{position:absolute;left:6px;top:1px;font-family:var(--mono);font-size:10px;color:var(--tm);font-weight:500}
.ps{width:50px;font-family:var(--mono);font-size:11px;color:var(--td);text-align:right}
.ps.hi{color:var(--green);font-weight:600}
.fb{display:flex;align-items:center;gap:8px;padding:3px 0}
.fn{width:100px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fn.ou{color:var(--accent);font-weight:600}
.ffb{flex:1;background:#141e2a;border-radius:2px;height:14px;overflow:hidden}
.ff{height:100%;border-radius:2px}
.ffo{background:linear-gradient(90deg,#164a72,#2a8ad0)}
.ffw{background:linear-gradient(90deg,#14443a,#1a6a50)}
.ffl{background:linear-gradient(90deg,#441818,#6a2020)}
.fff{background:linear-gradient(90deg,#1e2a38,#2a3a50)}
.fnum{width:40px;font-family:var(--mono);font-size:11px;color:var(--td);text-align:right}
.fpct{width:45px;font-family:var(--mono);font-size:11px;color:var(--td);text-align:right}
.fg{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.sb{margin-top:14px;padding:10px 12px;background:var(--card);border-radius:6px;border:1px solid var(--bl)}
.sbl{font-family:var(--mono);font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stg{display:flex;flex-wrap:wrap;gap:6px}
.stgi{font-family:var(--mono);font-size:11px;padding:3px 9px;background:#12222f;border-radius:4px;color:var(--accent);border:1px solid var(--ad)}
.ib{margin-top:10px;padding:10px 12px;border-radius:6px;font-size:13px}
.iby{background:var(--amd);border:1px solid #4a3a10}.iby .ibl{color:var(--amber)}.iby .it{color:#d0b050}
.ibg{background:var(--gd);border:1px solid #1a4a30}.ibg .ibl{color:var(--green)}.ibg .it{color:#70d080}
.ibl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--card);border-radius:8px;padding:10px 12px;border:1px solid var(--bl)}
.sc.live{border-color:#443810;animation:pb 2s ease-in-out infinite}
@keyframes pb{0%,100%{border-color:#443810}50%{border-color:#6a5a20}}
.sc.fw{border-left:3px solid var(--green)}.sc.fl{border-left:3px solid var(--red)}
.ss{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.ssl{color:var(--amber)}.ssf{color:var(--td)}.ssu{color:var(--accent)}
.sts{display:flex;justify-content:space-between;align-items:center}
.stn{font-size:13px;font-weight:500}
.stw{color:var(--green)}.stl{color:var(--td);text-decoration:line-through}
.snm{font-family:var(--mono);font-size:15px;font-weight:700}
.ssd{font-family:var(--mono);font-size:10px;color:var(--td);margin-right:4px}
.opb{display:inline-block;font-family:var(--mono);font-size:9px;padding:1px 5px;background:var(--ad);color:var(--accent);border-radius:3px;margin-left:4px}
.hidden{display:none}
footer{margin-top:24px;padding:12px 14px;border-top:1px solid var(--bl);font-family:var(--mono);font-size:10px;color:var(--td);display:flex;justify-content:space-between}
</style>
</head>

function showTab(id,btn){
  document.querySelectorAll('[id^="tab-"]').forEach(function(el){el.classList.add('hidden')});
  document.getElementById('tab-'+id).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active')});
  btn.classList.add('active');
}

function mc(label,value,sub,accent){
  var c=document.createElement('div');c.className='mc'+(accent?' ac':'');
  c.innerHTML='<div class="ml">'+label+'</div><div class="mv">'+value+'</div>'+(sub?'<div class="ms">'+sub+'</div>':'');
  return c;
}

function pickRow(p,total,showLev){
  var pct=(p.n/total*100);
  var dot=p.st==='won'?'var(--green)':p.st==='lost'?'var(--red)':p.st==='live'?'var(--amber)':'var(--td)';
  var lev=p.fp?(pct/p.fp).toFixed(1):'';
  var levHi=parseFloat(lev)>2?'hi':'';
  var html='<div class="pr">';
  html+='<div class="dot" style="background:'+dot+'"></div>';
  html+='<div class="pn">('+p.s+') '+p.t+'</div>';
  html+='<div class="pb"><div class="pf" style="width:'+Math.min(pct*2,100)+'%"></div><span class="pfl">'+p.n+' ('+pct.toFixed(0)+'%)</span></div>';
  html+='<div class="ps">'+p.wp+'%</div>';
  if(showLev&&p.fp)html+='<div class="ps '+levHi+'">'+lev+'x</div>';
  html+='</div>';
  return html;
}

function fieldRow(f,maxPc,ourTeams){
  var isOur=ourTeams.indexOf(f.t)>=0;
  var cls=isOur?'ffo':f.g==='l'?'ffl':f.g==='w'?'ffw':'fff';
  var gc=f.g==='w'?'var(--green)':f.g==='l'?'var(--red)':'transparent';
  var html='<div class="fb">';
  html+='<div class="fn'+(isOur?' ou':'')+'">'+f.t+'</div>';
  html+='<div class="ffb"><div class="ff '+cls+'" style="width:'+(f.pc/maxPc*100)+'%"></div></div>';
  html+='<div class="fnum">'+f.p+'</div>';
  html+='<div class="fpct">'+f.pc+'%</div>';
  if(f.g)html+='<div class="fg" style="background:'+gc+'"></div>';
  html+='</div>';
  return html;
}

function renderContest(c,id){
  var el=document.getElementById(id);
  var inv=c.ours*c.buyin;
  var h='<div class="mg">';
  h+=mc('Investment','$'+inv.toLocaleString(),'$'+c.buyin+'/entry').outerHTML;
  h+=mc('Prize pool','$'+c.pool.toLocaleString(),Math.round(c.pool/inv)+'x leverage',true).outerHTML;
  h+=mc('Field share',((c.ours/c.size)*100).toFixed(1)+'%',c.ours+' of '+c.size.toLocaleString()).outerHTML;
  h+=mc('Alive',c.alive+'/'+c.ours,Math.round(c.alive/c.ours*100)+'% survival',true).outerHTML;
  h+='</div>';
  h+='<div class="st">Day 1 picks - Thursday</div>';
  c.d1.forEach(function(p){h+=pickRow(p,c.ours,true)});
  if(c.d2&&c.d2.length){
    h+='<div class="st">Day 2 picks - Friday</div>';
    c.d2.forEach(function(p){h+=pickRow(p,c.ours,false)});
  }
  if(c.saved){
    h+='<div class="sb"><div class="sbl">Saved for later rounds</div><div class="stg">';
    c.saved.forEach(function(t){h+='<span class="stgi">'+t+'</span>'});
    h+='</div></div>';
  }
  if(c.field&&c.field.length){
    var mx=Math.max.apply(null,c.field.map(function(f){return f.pc}));
    var ot=c.d1.map(function(p){return p.t});
    h+='<div class="st">Field pick distribution</div>';
    c.field.forEach(function(f){h+=fieldRow(f,mx,ot)});
  }
  if(c.dead){
    h+='<div class="ib iby"><div class="ibl">Dead money</div><div class="it">'+c.dead.n+' entries ('+c.dead.pc+'%) did not submit</div></div>';
  }
  if(c.seeds){
    h+='<div class="ib ibg"><div class="ibl">1/2 seed burns</div><div class="it">Only '+c.seeds.pc+'% burned a 1 or 2 seed on Day 1</div></div>';
  }
  el.innerHTML=h;
}

function renderOverview(){
  var S=D.splash,W=D.sweat;
  var inv=S.ours*S.buyin+W.ours*W.buyin;
  var pool=S.pool+W.pool;
  var alive=S.alive+W.alive;
  var tot=S.ours+W.ours;
  var h='<div class="mg">';
  h+=mc('Total investment','$'+inv.toLocaleString(),tot+' entries, 2 contests').outerHTML;
  h+=mc('Combined pool','$'+pool.toLocaleString(),Math.round(pool/inv)+'x leverage',true).outerHTML;
  h+=mc('Entries alive',alive+'/'+tot,'Splash '+S.alive+'/100 | Sweat '+W.alive+'/10',true).outerHTML;
  h+=mc('Day 1 edge','Us 84% vs Field 72%','Outsurvived field by ~12pp',true).outerHTML;
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  h+='<div class="mc"><div class="ml">Splash</div><div class="mv">'+S.alive+'/'+S.ours+'</div><div class="ms">'+S.name+' | $'+S.pool.toLocaleString()+' pool | '+S.vig+'% vig</div></div>';
  h+='<div class="mc ac"><div class="ml">Sweat</div><div class="mv">'+W.alive+'/'+W.ours+'</div><div class="ms">'+W.name+' | $'+W.pool.toLocaleString()+' pool | 0% vig</div></div>';
  h+='</div>';
  document.getElementById('tab-overview').innerHTML=h;
}

function renderScores(){
  var el=document.getElementById('tab-scores');
  if(!D.games.length){el.innerHTML='<div class="st">Scores auto-update from ESPN every 2 min</div><div style="color:var(--td);font-size:13px">Waiting for ESPN data...</div>';return}
  var h='<div class="st">Thursday - Day 1 games</div><div class="sg">';
  D.games.forEach(function(g){
    var cls='sc';
    if(g.status==='live')cls+=' live';
    if(g.status==='final'&&g.our_pick)cls+=g.our_pick_won?' fw':' fl';
    var sc=g.status==='live'?'ssl':g.status==='final'?'ssf':'ssu';
    var tm=g.status==='live'?g.time:g.status==='final'?'FINAL':g.time||'TBD';
    h+='<div class="'+cls+'">';
    h+='<div class="ss '+sc+'">'+tm+'</div>';
    h+='<div class="sts"><div><span class="ssd">('+g.away_seed+')</span><span class="stn">'+g.away+'</span></div>';
    if(g.status!=='upcoming')h+='<span class="snm">'+g.away_score+'</span>';
    h+='</div>';
    h+='<div class="sts"><div><span class="ssd">('+g.home_seed+')</span><span class="stn">'+g.home+'</span>';
    if(g.our_pick)h+='<span class="opb">OUR PICK</span>';
    if(g.saved_team)h+='<span class="opb" style="background:var(--amd);color:var(--amber)">SAVED</span>';
    h+='</div>';
    if(g.status!=='upcoming')h+='<span class="snm">'+g.home_score+'</span>';
    h+='</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

function renderPlayers(){
  var el=document.getElementById('tab-players');
  var h='<div class="st">Portfolio players (50+ entries) - Day 1 results</div>';
  D.splash.comp.forEach(function(p){
    var sp=p.a/p.e*100;
    var sc=sp>=90?'var(--green)':sp>=75?'var(--accent)':sp>=50?'var(--amber)':'var(--red)';
    var bd=p.us?'var(--ad)':'var(--bl)';
    var nc=p.us?'var(--accent)':'#eef2f6';
    h+='<div style="background:var(--card);border-radius:8px;padding:12px 14px;margin-bottom:8px;border:1px solid '+bd+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h+='<div style="font-size:14px;font-weight:600;color:'+nc+'">'+p.n+(p.us?' (YOU)':'')+'</div>';
    h+='<div style="font-family:var(--mono);font-size:13px;font-weight:600;color:'+sc+'">'+p.a+'/'+p.e+' alive ('+Math.round(sp)+'%)</div>';
    h+='</div>';
    h+='<div style="background:#141e2a;border-radius:3px;height:8px;margin-bottom:8px;overflow:hidden"><div style="height:100%;border-radius:3px;width:'+sp+'%;background:'+sc+'"></div></div>';
    h+='<div style="font-family:var(--mono);font-size:11px;color:var(--tm);margin-bottom:4px">'+p.pk+'</div>';
    h+='<div style="font-size:11px;color:var(--td);font-style:italic">'+p.note+'</div>';
    h+='</div>';
  });
  h+='<div class="st" style="margin-top:20px">Competitive insights</div>';
  var ins=[
    ["Leader","princehal (100%)","Heavy chalk NEB/GONZ but burned Houston"],
    ["Our position","3rd of 6 at 82%","Ahead of poopbutt2 (80%), MattyCollins (72%), daviesloveiii (65%)"],
    ["Field survival","75.7% (5,315/7,023)","We outperformed field by 6.3pp on Splash, perfect on Sweat"],
    ["Dead entries","1,708 eliminated","24.3% of field gone on Day 1"]
  ];
  ins.forEach(function(i){
    h+='<div style="padding:8px 12px;background:var(--card);border-radius:6px;margin-bottom:6px;border:1px solid var(--bl)">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px">';
    h+='<span style="font-family:var(--mono);font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px">'+i[0]+'</span>';
    h+='<span style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)">'+i[1]+'</span>';
    h+='</div><div style="font-size:12px;color:var(--tm)">'+i[2]+'</div></div>';
  });
  el.innerHTML=h;
}

function renderStrategy(){
  var el=document.getElementById('tab-strategy');
  var h='<div class="st">Core principles</div>';
  ["Save ALL 1/2 seeds for Sweet 16+","Pick 3-5 seeds on Days 1-2 (85-99% win prob)","Diversify across 5 groups (Splash) / 3 groups (Sweat)","Endgame team availability death is the biggest edge","Nebraska 17-22% of field = massive free leverage"].forEach(function(p){
    h+='<div style="font-size:13px;color:var(--tm);padding:5px 0 5px 12px;border-left:2px solid var(--ad);margin-bottom:4px">'+p+'</div>';
  });
  h+='<div class="st" style="margin-top:16px">Key field data</div>';
  h+='<div class="mg">';
  h+=mc('Seeds burned','4.0%','Duke(109) Michigan(44) Houston(127)').outerHTML;
  h+=mc('Dead money','6.2%','54 Sweat entries no submit').outerHTML;
  h+=mc('Nebraska','17-22%','of field, we have 0%').outerHTML;
  h+=mc('Our leverage','~3x avg','overweight low-ownership',true).outerHTML;
  h+='</div>';
  h+='<div class="st" style="margin-top:16px">Upcoming</div>';
  [["Tonight","Re-scrape Splash entries after all Day 1 games"],["Fri AM","Upload Day 2 CSV + submit Sweat picks"],["Fri PM","Monitor Day 2 games, scrape field data"],["Saturday","Day 3 - Round of 32"],["Late tourney","Hedging strategy when equity > $20K"]].forEach(function(m){
    h+='<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--bl)"><span style="width:80px;font-family:var(--mono);font-size:11px;color:var(--td)">'+m[0]+'</span><span style="font-size:12px;color:var(--tm)">'+m[1]+'</span></div>';
  });
  el.innerHTML=h;
}

function render(){renderOverview();renderScores();renderContest(D.splash,'tab-splash');renderContest(D.sweat,'tab-sweat');renderPlayers();renderStrategy();document.getElementById('last-updated').textContent='Updated: '+new Date().toLocaleTimeString()}

setInterval(function(){document.getElementById('clock').textContent=new Date().toLocaleTimeString()},1000);
render();

// ESPN live scores
var OUR=['ILL','GONZ','MSU','ARK','WIS'];
var SAVED=['DUKE','MICH','HOU'];
function fetchScores(){
  fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=100&dates=20260319&limit=50')
  .then(function(r){return r.json()})
  .then(function(data){
    if(!data.events)return;
    var g=[];
    data.events.forEach(function(ev){
      var c=ev.competitions&&ev.competitions[0];if(!c)return;
      var ts=c.competitors||[];
      var hm=ts.find(function(t){return t.homeAway==='home'})||ts[0];
      var aw=ts.find(function(t){return t.homeAway==='away'})||ts[1];
      var ha=hm&&hm.team?hm.team.abbreviation:'';
      var aa=aw&&aw.team?aw.team.abbreviation:'';
      var hn=hm&&hm.team?hm.team.shortDisplayName||hm.team.displayName:'';
      var an=aw&&aw.team?aw.team.shortDisplayName||aw.team.displayName:'';
      var hs=parseInt(hm&&hm.score)||0;var as=parseInt(aw&&aw.score)||0;
      var hsd=parseInt(hm&&hm.curatedRank&&hm.curatedRank.current)||0;
      var asd=parseInt(aw&&aw.curatedRank&&aw.curatedRank.current)||0;
      var so=c.status||{};var st=so.type&&so.type.name||'';
      var sd=so.type&&so.type.shortDetail||'';
      var cl=so.displayClock||'';var pr=so.period||0;
      var status='upcoming',tm='TBD';
      if(st==='STATUS_FINAL'||st==='STATUS_END_PERIOD'){status='final';tm='FINAL'}
      else if(st==='STATUS_IN_PROGRESS'||st==='STATUS_HALFTIME'){status='live';tm=st==='STATUS_HALFTIME'?'HALF':cl+' '+(pr===1?'1H':pr===2?'2H':'OT')}
      else{tm=sd||'TBD'}
      var op=null;if(OUR.indexOf(ha)>=0)op=hn;else if(OUR.indexOf(aa)>=0)op=an;
      var opw=false;if(status==='final'&&op){opw=op===hn?hs>as:as>hs}
      var sv=null;if(SAVED.indexOf(ha)>=0)sv=hn;else if(SAVED.indexOf(aa)>=0)sv=an;
      g.push({away:an,away_seed:asd,away_alias:aa,home:hn,home_seed:hsd,home_alias:ha,status:status,away_score:as,home_score:hs,time:tm,our_pick:op,our_pick_won:opw,saved_team:sv});
    });
    if(g.length){D.games=g;render();document.getElementById('last-updated').textContent='Scores: '+new Date().toLocaleTimeString()}
  }).catch(function(){});
}
fetchScores();
setInterval(fetchScores,120000);
</script>
