<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCAA Survivor 2026 — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080d13;--surface:#0d1520;--card:#111c28;--border:#1a2a3a;--border-lite:#14202c;
--text:#d0dae4;--text-muted:#6080a0;--text-dim:#3a5570;--accent:#2a9df4;--accent-dim:#164a72;
--green:#2dd4a0;--green-dim:#14443a;--red:#f06060;--red-dim:#441818;--amber:#f0b040;--amber-dim:#443810;
--font-mono:'IBM Plex Mono',monospace;--font-body:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
.wrap{max-width:1100px;margin:0 auto;padding:20px 24px}
header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border-lite)}
.logo-tag{font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
h1{font-size:24px;font-weight:700;color:#eef2f6;letter-spacing:-.5px}
.date-info{text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);line-height:1.8}
.date-info .day{color:var(--accent);font-weight:600;font-size:12px}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:8px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:9px 0;text-align:center;font-size:12px;font-weight:500;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--text-dim);font-family:var(--font-body);letter-spacing:.3px;transition:all .2s}
.tab.active{background:var(--accent-dim);color:var(--accent)}
.tab:hover:not(.active){color:var(--text-muted)}

/* Metric cards */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--card);border-radius:8px;padding:14px 16px;border:1px solid var(--border-lite)}
.metric.accent{background:linear-gradient(135deg,#0d1f30,#132840);border-color:var(--accent-dim)}
.metric-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px}
.metric-value{font-size:22px;font-weight:700;color:#eef2f6;margin-top:4px;font-family:var(--font-mono)}
.metric.accent .metric-value{color:var(--accent)}
.metric-sub{font-size:11px;color:var(--text-dim);margin-top:2px}

/* Contest panel */
.panel{background:var(--surface);border-radius:10px;border:1px solid var(--border-lite);margin-bottom:16px;overflow:hidden}
.panel-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:var(--card);border-bottom:1px solid var(--border-lite)}
.panel-header:hover{background:#13222f}
.panel-title{font-size:16px;font-weight:600;color:#eef2f6}
.panel-meta{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-left:12px}
.panel-badge{font-family:var(--font-mono);font-size:12px;font-weight:600;padding:2px 10px;border-radius:4px}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.panel-body{padding:16px 18px}
.chevron{color:var(--text-dim);font-size:18px;transition:transform .2s}
.chevron.open{transform:rotate(90deg)}

/* Pick bars */
.pick-section-title{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.pick-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border-lite)}
.pick-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}.dot-gray{background:var(--text-dim)}
.pick-name{width:110px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pick-name.ours{color:var(--accent);font-weight:600}
.pick-bar-bg{flex:1;background:#141e2a;border-radius:3px;height:16px;position:relative;overflow:hidden}
.pick-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.fill-ours{background:linear-gradient(90deg,#164a72,#2a8ad0)}
.fill-field{background:linear-gradient(90deg,#1e2a38,#2a3a50)}
.fill-winning{background:linear-gradient(90deg,#14443a,#1a6a50)}
.fill-losing{background:linear-gradient(90deg,#441818,#6a2020)}
.pick-bar-label{position:absolute;left:6px;top:1px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);font-weight:500}
.pick-stat{width:50px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);text-align:right}
.pick-stat.highlight{color:var(--green);font-weight:600}

/* Saved teams */
.saved-box{margin-top:14px;padding:10px 12px;background:var(--card);border-radius:6px;border:1px solid var(--border-lite)}
.saved-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.saved-tags{display:flex;flex-wrap:wrap;gap:6px}
.saved-tag{font-family:var(--font-mono);font-size:11px;padding:3px 9px;background:#12222f;border-radius:4px;color:var(--accent);border:1px solid var(--accent-dim)}

/* Info boxes */
.info-box{margin-top:10px;padding:10px 12px;border-radius:6px;font-size:13px}
.info-box .info-label{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.info-dead{background:var(--amber-dim);border:1px solid #4a3a10}.info-dead .info-label{color:var(--amber)}.info-dead .info-text{color:#d0b050}
.info-green{background:var(--green-dim);border:1px solid #1a4a30}.info-green .info-label{color:var(--green)}.info-green .info-text{color:#70d080}

/* Scores */
.scores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.score-card{background:var(--card);border-radius:8px;padding:10px 12px;border:1px solid var(--border-lite)}
.score-card.live{border-color:#443810;animation:pulse-border 2s ease-in-out infinite}
@keyframes pulse-border{0%,100%{border-color:#443810}50%{border-color:#6a5a20}}
.score-card.final-win{border-left:3px solid var(--green)}
.score-card.final-loss{border-left:3px solid var(--red)}
.score-status{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.status-live{color:var(--amber)}.status-final{color:var(--text-dim)}.status-upcoming{color:var(--accent)}
.score-teams{display:flex;justify-content:space-between;align-items:center}
.score-team{font-size:13px;font-weight:500}
.score-team.winner{color:var(--green)}.score-team.loser{color:var(--text-dim);text-decoration:line-through}
.score-num{font-family:var(--font-mono);font-size:15px;font-weight:700}
.score-seed{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-right:4px}
.our-pick-badge{display:inline-block;font-family:var(--font-mono);font-size:9px;padding:1px 5px;background:var(--accent-dim);color:var(--accent);border-radius:3px;margin-left:4px}

/* Field analysis */
.field-bar{display:flex;align-items:center;gap:8px;padding:3px 0}
.field-name{width:100px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.field-name.ours{color:var(--accent);font-weight:600}
.field-fill-bg{flex:1;background:#141e2a;border-radius:2px;height:14px;overflow:hidden}
.field-fill{height:100%;border-radius:2px}
.field-num{width:40px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);text-align:right}
.field-pct{width:45px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);text-align:right}
.field-grade{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* Strategy panel */
.strategy-principle{font-size:13px;color:var(--text-muted);padding:5px 0 5px 12px;border-left:2px solid var(--accent-dim)}
.strategy-milestone{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-lite)}
.milestone-when{width:80px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);flex-shrink:0}
.milestone-what{font-size:12px;color:var(--text-muted)}

/* Player analysis */
.player-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border-lite)}
.player-name{width:140px;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-name.is-us{color:var(--accent);font-weight:700}
.player-count{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);width:40px;text-align:right}
.player-bar{flex:1;background:#141e2a;border-radius:2px;height:10px;overflow:hidden}
.player-fill{height:100%;background:var(--accent-dim);border-radius:2px}
.player-fill.is-us{background:var(--accent)}

footer{margin-top:24px;padding:12px 14px;border-top:1px solid var(--border-lite);font-family:var(--font-mono);font-size:10px;color:var(--text-dim);display:flex;justify-content:space-between}
.hidden{display:none}
</style>
</head>

// ============================================================
// RENDERING

function showTab(id) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab-' + id).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function h(tag, attrs, ...children) {
  let el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'onclick') el.onclick = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}

function metricCard(label, value, sub, accent) {
  let card = h('div', {className: 'metric' + (accent ? ' accent' : '')});
  card.appendChild(h('div', {className: 'metric-label'}, label));
  card.appendChild(h('div', {className: 'metric-value'}, value));
  if (sub) card.appendChild(h('div', {className: 'metric-sub'}, sub));
  return card;
}

function renderOverview() {
  let S = DATA.splash, W = DATA.sweat;
  let totalInvest = S.our_entries * S.buy_in + W.our_entries * W.buy_in;
  let totalPrize = S.prize_pool + W.prize_pool;
  let totalAlive = S.our_alive + W.our_alive;
  let totalEntries = S.our_entries + W.our_entries;

  let m = document.getElementById('overview-metrics');
  m.innerHTML = '';
  m.appendChild(metricCard('Total investment', '$' + totalInvest.toLocaleString(), totalEntries + ' entries across 2 contests'));
  m.appendChild(metricCard('Combined prize pool', '$' + totalPrize.toLocaleString(), Math.round(totalPrize/totalInvest) + 'x leverage', true));
  m.appendChild(metricCard('Entries alive', totalAlive + '/' + totalEntries, 'Splash ' + S.our_alive + '/100 | Sweat ' + W.our_alive + '/10', true));
  m.appendChild(metricCard('Day 1 edge', 'Us 84% vs Field ~72%', 'Outsurvived field by ~12pp', true));

  let c = document.getElementById('overview-contests');
  c.innerHTML = '';
  c.appendChild(renderContestMini(S, 'Splash'));
  c.appendChild(renderContestMini(W, 'Sweat'));
}

function renderContestMini(contest, label) {

  left.appendChild(h('span', {className: 'panel-meta'}, contest.our_entries + ' entries | ' + contest.field_size.toLocaleString() + ' field'));
  hdr.appendChild(left);
  let badge = h('span', {className: 'panel-badge ' + (contest.vig === 0 ? 'badge-green' : 'badge-amber')}, contest.vig === 0 ? '0% vig' : contest.vig + '% vig');
  hdr.appendChild(badge);
  panel.appendChild(hdr);
  return panel;
}

function renderContest(contest, containerId) {
  let container = document.getElementById(containerId);
  container.innerHTML = '';

  // Metrics
  let totalInvest = contest.our_entries * contest.buy_in;
  let m = h('div', {className: 'metrics'});
  m.appendChild(metricCard('Investment', '$' + totalInvest.toLocaleString(), '$' + contest.buy_in + '/entry'));
  m.appendChild(metricCard('Prize pool', '$' + contest.prize_pool.toLocaleString(), Math.round(contest.prize_pool/totalInvest) + 'x leverage', true));
  m.appendChild(metricCard('Field share', ((contest.our_entries/contest.field_size)*100).toFixed(1) + '%', contest.our_entries + ' of ' + contest.field_size.toLocaleString()));
  m.appendChild(metricCard('Alive', contest.our_alive + '/' + contest.our_entries, '100% survival', true));
  container.appendChild(m);

  // Day 1 picks
  container.appendChild(h('div', {className: 'pick-section-title', style: 'margin-top:8px'}, 'Day 1 picks — Thursday'));
  (contest.picks.day1 || []).forEach(p => {
    let row = h('div', {className: 'pick-row'});
    let dotCls = p.status === 'won' ? 'dot-green' : p.status === 'lost' ? 'dot-red' : p.status === 'live' ? 'dot-amber' : p.status === 'pending' ? 'dot-amber' : 'dot-gray';
    row.appendChild(h('div', {className: 'pick-dot ' + dotCls}));
    row.appendChild(h('div', {className: 'pick-name ours'}, '(' + p.seed + ') ' + p.team));
    
    let pct = (p.entries / contest.our_entries * 100);
    let barBg = h('div', {className: 'pick-bar-bg'});
    barBg.appendChild(h('div', {className: 'pick-bar-fill fill-ours', style: 'width:' + Math.min(pct*2,100) + '%'}));
    barBg.appendChild(h('span', {className: 'pick-bar-label'}, p.entries + ' entries (' + pct.toFixed(0) + '%)'));
    row.appendChild(barBg);
    row.appendChild(h('div', {className: 'pick-stat'}, p.win_pct + '%'));
    
    if (p.field_pct != null) {
      let lev = (pct / p.field_pct).toFixed(1);
      row.appendChild(h('div', {className: 'pick-stat' + (parseFloat(lev) > 2 ? ' highlight' : '')}, lev + 'x'));
    }
    container.appendChild(row);
  });

  // Day 2 picks
  if (contest.picks.day2?.length) {
    container.appendChild(h('div', {className: 'pick-section-title', style: 'margin-top:16px'}, 'Day 2 picks — Friday'));
    (contest.picks.day2 || []).forEach(p => {
      let row = h('div', {className: 'pick-row'});
      row.appendChild(h('div', {className: 'pick-dot dot-gray'}));
      row.appendChild(h('div', {className: 'pick-name ours'}, '(' + p.seed + ') ' + p.team));
      let pct = (p.entries / contest.our_entries * 100);
      let barBg = h('div', {className: 'pick-bar-bg'});
      barBg.appendChild(h('div', {className: 'pick-bar-fill fill-ours', style: 'width:' + Math.min(pct*2,100) + '%'}));
      barBg.appendChild(h('span', {className: 'pick-bar-label'}, p.entries + ' entries (' + pct.toFixed(0) + '%)'));
      row.appendChild(barBg);
      row.appendChild(h('div', {className: 'pick-stat'}, p.win_pct + '%'));
      container.appendChild(row);
    });
  }

  // Saved teams
  if (contest.saved?.length) {
    let box = h('div', {className: 'saved-box'});
    box.appendChild(h('div', {className: 'saved-label'}, 'Saved for later rounds'));
    let tags = h('div', {className: 'saved-tags'});
    contest.saved.forEach(t => tags.appendChild(h('span', {className: 'saved-tag'}, t)));
    box.appendChild(tags);
    container.appendChild(box);
  }

  // Field distribution
  if (contest.field_picks?.length) {
    container.appendChild(h('div', {className: 'pick-section-title', style: 'margin-top:16px'}, 'Field pick distribution'));
    let ourTeams = [...(contest.picks.day1||[]), ...(contest.picks.day2||[])].map(p => p.team);
    let maxPct = Math.max(...contest.field_picks.map(f => f.pct));
    contest.field_picks.forEach(f => {
      let isOurs = ourTeams.includes(f.team);
      let row = h('div', {className: 'field-bar'});
      row.appendChild(h('div', {className: 'field-name' + (isOurs ? ' ours' : '')}, f.team));
      let bg = h('div', {className: 'field-fill-bg'});
      let fillCls = isOurs ? 'fill-ours' : f.grade === 'losing' ? 'fill-losing' : f.grade === 'winning' ? 'fill-winning' : 'fill-field';
      bg.appendChild(h('div', {className: 'field-fill ' + fillCls, style: 'width:' + (f.pct/maxPct*100) + '%'}));
      row.appendChild(bg);
      row.appendChild(h('div', {className: 'field-num'}, f.picks));
      row.appendChild(h('div', {className: 'field-pct'}, f.pct + '%'));
      if (f.grade) row.appendChild(h('div', {className: 'field-grade', style: 'background:' + (f.grade==='winning'?'var(--green)':'var(--red)')}));
      container.appendChild(row);
    });
  }

  // Dead money / seeds burned
  if (contest.dead_money) {
    let box = h('div', {className: 'info-box info-dead'});
    box.appendChild(h('div', {className: 'info-label'}, 'Dead money'));
    box.appendChild(h('div', {className: 'info-text'}, contest.dead_money.no_submit + ' entries (' + contest.dead_money.pct + '%) didn\'t submit — auto-eliminated'));
    container.appendChild(box);
  }
  if (contest.seeds_burned) {
    let box = h('div', {className: 'info-box info-green'});
    box.appendChild(h('div', {className: 'info-label'}, '1/2 seed burns'));
    box.appendChild(h('div', {className: 'info-text'}, 'Only ' + contest.seeds_burned.pct + '% burned a 1 or 2 seed today'));
    container.appendChild(box);
  }
}

// ============================================================
// LIVE SCORE FETCHING — ESPN API (no auth needed)
// ============================================================

// Map our pick team names to ESPN abbreviations
const TEAM_TO_ALIAS = {
  'Illinois':'ILL','Gonzaga':'GONZ','Michigan St':'MSU','Arkansas':'ARK','Wisconsin':'WIS',
  'Virginia':'UVA','Kansas':'KU','Alabama':'BAMA','St Johns':'SJU','Texas Tech':'TTU',
  'Duke':'DUKE','Michigan':'MICH','Houston':'HOU','Arizona':'ARIZ','Florida':'FLA',
  'UConn':'CONN','Iowa State':'ISU','Purdue':'PUR','Nebraska':'NEB','Louisville':'LOU',
  'Ohio State':'OSU','Vanderbilt':'VAN','UNC':'UNC','BYU':'BYU','Saint Mary\'s':'SMC',
  'TCU':'TCU','South Florida':'USF','Troy':'TROY','High Point':'HP','Georgia':'UGA',
  'Texas':'TEX','VCU':'VCU','Saint Louis':'SLU','Texas A&M':'TA&M','McNeese':'MCNS',
};
const ALIAS_TO_TEAM = Object.fromEntries(Object.entries(TEAM_TO_ALIAS).map(([k,v])=>[v,k]));

const OUR_PICKS_ALIASES = ['ILL','GONZ','MSU','ARK','WIS']; // Day 1 Splash picks
const OUR_SWEAT_ALIASES = ['ILL','GONZ','MSU']; // Day 1 Sweat picks
const SAVED_ALIASES = ['DUKE','MICH','HOU'];

function syncPickStatuses(games) {
  // Build a lookup: alias -> {status, won}
  let results = {};
  games.forEach(g => {
    if (g.status === 'final') {
      let homeWon = g.home_score > g.away_score;
      results[g.home_alias] = { status: 'final', won: homeWon };
      results[g.away_alias] = { status: 'final', won: !homeWon };
    } else if (g.status === 'live') {
      results[g.home_alias] = { status: 'live' };
      results[g.away_alias] = { status: 'live' };
    }
  });
  
  // Update Splash picks
  function updatePicks(picks) {
    if (!picks) return;
    picks.forEach(p => {
      let alias = TEAM_TO_ALIAS[p.team];
      if (!alias) {
        // Try fuzzy match on game data
        games.forEach(g => {
          if (g.home.includes(p.team) || p.team.includes(g.home)) alias = g.home_alias;
          if (g.away.includes(p.team) || p.team.includes(g.away)) alias = g.away_alias;
        });
      }
      if (alias && results[alias]) {
        let r = results[alias];
        if (r.status === 'final') {
          p.status = r.won ? 'won' : 'lost';
        } else if (r.status === 'live') {
          p.status = 'live';
        }
      }
    });
  }
  
  updatePicks(DATA.splash.picks.day1);
  updatePicks(DATA.splash.picks.day2);
  updatePicks(DATA.sweat.picks.day1);
  updatePicks(DATA.sweat.picks.day2);
  
  // Update field picks grade from ESPN
  function updateFieldGrade(fieldPicks) {
    if (!fieldPicks) return;
    fieldPicks.forEach(f => {
      let alias = TEAM_TO_ALIAS[f.team];
      if (alias && results[alias]) {
        let r = results[alias];
        if (r.status === 'final') {
          f.grade = r.won ? 'winning' : 'losing';
        } else if (r.status === 'live') {
          // Keep existing or set to null
        }
      }
    });
  }
  
  updateFieldGrade(DATA.splash.field_picks);
  updateFieldGrade(DATA.sweat.field_picks);
  
  // Update alive counts
  let splashLosses = 0;
  let sweatLosses = 0;
  (DATA.splash.picks.day1 || []).forEach(p => {
    if (p.status === 'lost') splashLosses += p.entries;
  });
  (DATA.sweat.picks.day1 || []).forEach(p => {
    if (p.status === 'lost') sweatLosses += p.entries;
  });
  DATA.splash.our_alive = DATA.splash.our_entries - splashLosses;
  DATA.sweat.our_alive = DATA.sweat.our_entries - sweatLosses;
}

async function fetchLiveScores() {
  try {
    let resp = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?groups=100&dates=20260319&limit=50');
    let data = await resp.json();
    if (!data.events) return;
    
    let newGames = [];
    data.events.forEach(ev => {
      let comp = ev.competitions?.[0];
      if (!comp) return;
      
      let teams = comp.competitors || [];
      let home = teams.find(t => t.homeAway === 'home') || teams[0];
      let away = teams.find(t => t.homeAway === 'away') || teams[1];
      
      let homeAlias = home?.team?.abbreviation || '';
      let awayAlias = away?.team?.abbreviation || '';
      let homeName = home?.team?.shortDisplayName || home?.team?.displayName || homeAlias;
      let awayName = away?.team?.shortDisplayName || away?.team?.displayName || awayAlias;
      let homeSeed = parseInt(home?.curatedRank?.current) || parseInt(home?.seed) || 0;
      let awaySeed = parseInt(away?.curatedRank?.current) || parseInt(away?.seed) || 0;
      let homeScore = parseInt(home?.score) || 0;
      let awayScore = parseInt(away?.score) || 0;
      
      let statusObj = comp.status || {};
      let statusType = statusObj.type?.name || '';
      let statusDetail = statusObj.type?.shortDetail || statusObj.type?.detail || '';
      let clock = statusObj.displayClock || '';
      let period = statusObj.period || 0;
      
      let status = 'upcoming';
      let timeDisplay = '';
      if (statusType === 'STATUS_FINAL' || statusType === 'STATUS_END_PERIOD') {
        status = 'final';
        timeDisplay = 'FINAL';
      } else if (statusType === 'STATUS_IN_PROGRESS' || statusType === 'STATUS_HALFTIME') {
        status = 'live';
        if (statusType === 'STATUS_HALFTIME') timeDisplay = 'HALF';
        else timeDisplay = clock + ' ' + (period === 1 ? '1H' : period === 2 ? '2H' : 'OT');
      } else {
        timeDisplay = statusDetail || ev.date?.substring(11,16) || 'TBD';
      }
      
      // Determine if this is our pick
      let ourPick = null;
      if (OUR_PICKS_ALIASES.includes(homeAlias)) ourPick = homeName;
      else if (OUR_PICKS_ALIASES.includes(awayAlias)) ourPick = awayName;
      
      let ourPickWon = false;
      if (status === 'final' && ourPick) {
        if (ourPick === homeName) ourPickWon = homeScore > awayScore;
        else ourPickWon = awayScore > homeScore;
      }

      // Check if saved team is playing
      let savedTeam = null;
      if (SAVED_ALIASES.includes(homeAlias)) savedTeam = homeName;
      else if (SAVED_ALIASES.includes(awayAlias)) savedTeam = awayName;
      
      newGames.push({
        away: awayName, away_seed: awaySeed, away_alias: awayAlias,
        home: homeName, home_seed: homeSeed, home_alias: homeAlias,
        status: status, away_score: awayScore, home_score: homeScore,
        time: timeDisplay, our_pick: ourPick, our_pick_won: ourPickWon,
        saved_team: savedTeam,
      });
    });
    
    if (newGames.length > 0) {
      DATA.games = newGames;
      
      // Sync game results to pick statuses in Splash and Sweat
      syncPickStatuses(newGames);
      
      render();
      document.getElementById('last-updated').textContent = 'Scores updated: ' + new Date().toLocaleTimeString();
      console.log('Scores refreshed:', newGames.length, 'games');
    }
  } catch(e) {
    console.warn('Score fetch failed:', e.message);
  }
}

// Fetch scores immediately and every 2 minutes
fetchLiveScores();
setInterval(fetchLiveScores, 120000);
